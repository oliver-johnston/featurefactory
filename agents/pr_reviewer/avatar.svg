<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <rect width="40" height="40" fill="#7f1d1d"/>
  <!-- Neat combed dark hair -->
  <rect x="12" y="2" width="16" height="3" fill="#1c1917"/>
  <rect x="8" y="4" width="24" height="5" fill="#1c1917"/>
  <rect x="8" y="9" width="2" height="5" fill="#1c1917"/>
  <rect x="30" y="9" width="2" height="5" fill="#1c1917"/>
  <!-- Side part (lighter groove) -->
  <rect x="16" y="4" width="2" height="5" fill="#44403c"/>
  <!-- Medium pale face -->
  <rect x="10" y="9" width="20" height="14" fill="#fed7aa"/>
  <!-- Furrowed brow (shadow above eyes) -->
  <rect x="13" y="11" width="6" height="1" fill="#c9956a"/>
  <rect x="21" y="11" width="6" height="1" fill="#c9956a"/>
  <!-- Round glasses (dark gray) -->
  <rect x="12" y="13" width="7" height="1" fill="#374151"/>
  <rect x="12" y="17" width="7" height="1" fill="#374151"/>
  <rect x="12" y="13" width="1" height="5" fill="#374151"/>
  <rect x="18" y="13" width="1" height="5" fill="#374151"/>
  <rect x="19" y="15" width="2" height="1" fill="#374151"/>
  <rect x="21" y="13" width="7" height="1" fill="#374151"/>
  <rect x="21" y="17" width="7" height="1" fill="#374151"/>
  <rect x="21" y="13" width="1" height="5" fill="#374151"/>
  <rect x="27" y="13" width="1" height="5" fill="#374151"/>
  <!-- Stern eyes (small) -->
  <rect x="14" y="15" width="3" height="1" fill="#0f172a"/>
  <rect x="23" y="15" width="3" height="1" fill="#0f172a"/>
  <!-- Frown: middle up, corners down -->
  <rect x="17" y="19" width="6" height="1" fill="#92400e"/>
  <rect x="15" y="20" width="2" height="1" fill="#92400e"/>
  <rect x="23" y="20" width="2" height="1" fill="#92400e"/>
  <!-- Neck -->
  <rect x="17" y="23" width="6" height="3" fill="#fed7aa"/>
  <!-- Gray jacket -->
  <rect x="6" y="26" width="28" height="14" fill="#6b7280"/>
  <!-- White collar -->
  <rect x="14" y="26" width="5" height="4" fill="#f3f4f6"/>
  <rect x="21" y="26" width="5" height="4" fill="#f3f4f6"/>
</svg>
