id: technical_writer
name: "Technical Writer"
role: "Documentation"
description: "Writes and maintains documentation: READMEs, API docs, changelogs, and user guides."
prompt: "prompt.md"
avatar: "avatar.svg"
capabilities:
  git: true
  filesystem: true
  network: false
defaults:
  shell: bash
  start_status: in_progress
  command:
    - claude
    - --allowedTools
    - Read,Write,Edit,MultiEdit,Glob,Grep,Bash
