<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <rect width="40" height="40" fill="#1e3a5f"/>
  <!-- Distinguished dark hair -->
  <rect x="12" y="3" width="16" height="3" fill="#4b5563"/>
  <rect x="8" y="5" width="24" height="4" fill="#4b5563"/>
  <!-- Gray temples (salt and pepper) -->
  <rect x="8" y="9" width="3" height="8" fill="#9ca3af"/>
  <rect x="29" y="9" width="3" height="8" fill="#9ca3af"/>
  <!-- Warmer medium tone face -->
  <rect x="10" y="9" width="20" height="14" fill="#d4a574"/>
  <!-- Rectangular reading glasses (wide, shallow) -->
  <rect x="12" y="13" width="7" height="1" fill="#374151"/>
  <rect x="12" y="16" width="7" height="1" fill="#374151"/>
  <rect x="12" y="13" width="1" height="4" fill="#374151"/>
  <rect x="18" y="13" width="1" height="4" fill="#374151"/>
  <rect x="19" y="14" width="2" height="1" fill="#374151"/>
  <rect x="21" y="13" width="7" height="1" fill="#374151"/>
  <rect x="21" y="16" width="7" height="1" fill="#374151"/>
  <rect x="21" y="13" width="1" height="4" fill="#374151"/>
  <rect x="27" y="13" width="1" height="4" fill="#374151"/>
  <!-- Calm wise eyes -->
  <rect x="14" y="14" width="3" height="1" fill="#1c1917"/>
  <rect x="23" y="14" width="3" height="1" fill="#1c1917"/>
  <!-- Slight contemplative smile: middle down, corners up -->
  <rect x="17" y="20" width="6" height="1" fill="#92400e"/>
  <rect x="15" y="19" width="2" height="1" fill="#92400e"/>
  <rect x="23" y="19" width="2" height="1" fill="#92400e"/>
  <!-- Black turtleneck collar (high, up to chin at y=23) -->
  <rect x="13" y="23" width="14" height="5" fill="#111827"/>
  <!-- Turtleneck body -->
  <rect x="5" y="28" width="30" height="12" fill="#111827"/>
</svg>
