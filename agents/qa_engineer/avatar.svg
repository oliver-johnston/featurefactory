<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <rect width="40" height="40" fill="#0e7490"/>
  <!-- Short neat dark hair with side part -->
  <rect x="12" y="2" width="16" height="3" fill="#1c1917"/>
  <rect x="9" y="5" width="22" height="4" fill="#1c1917"/>
  <rect x="9" y="9" width="2" height="7" fill="#1c1917"/>
  <rect x="29" y="9" width="2" height="7" fill="#1c1917"/>
  <!-- Side part groove -->
  <rect x="18" y="3" width="2" height="3" fill="#374151"/>
  <!-- Warm golden skin (East Asian tone) -->
  <rect x="10" y="9" width="20" height="14" fill="#ecc88c"/>
  <!-- Furrowed brow shadows (focused / scrutinizing) -->
  <rect x="13" y="12" width="5" height="1" fill="#c9a054"/>
  <rect x="22" y="12" width="5" height="1" fill="#c9a054"/>
  <!-- Narrow focused eyes -->
  <rect x="14" y="14" width="4" height="1" fill="#1c1917"/>
  <rect x="22" y="14" width="4" height="1" fill="#1c1917"/>
  <!-- Scrutinizing neutral mouth -->
  <rect x="16" y="20" width="8" height="1" fill="#78350f"/>
  <!-- Neck -->
  <rect x="17" y="23" width="6" height="3" fill="#ecc88c"/>
  <!-- Teal work jacket -->
  <rect x="6" y="26" width="28" height="14" fill="#155e75"/>
  <!-- White shirt collar panels -->
  <rect x="14" y="26" width="5" height="4" fill="#f3f4f6"/>
  <rect x="21" y="26" width="5" height="4" fill="#f3f4f6"/>
  <!-- Inspection badge (left breast) -->
  <rect x="8" y="30" width="7" height="5" fill="#0e7490"/>
  <rect x="9" y="31" width="5" height="1" fill="#f8fafc"/>
  <rect x="9" y="33" width="3" height="1" fill="#34d399"/>
</svg>
