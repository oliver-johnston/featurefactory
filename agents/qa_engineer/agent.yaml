id: qa_engineer
name: "QA Engineer"
role: "Quality Assurance"
description: "Writes and runs tests, validates acceptance criteria, and confirms features work correctly before sign-off."
prompt: "prompt.md"
avatar: "avatar.svg"
capabilities:
  git: true
  filesystem: true
  network: false
defaults:
  shell: bash
  start_status: in_progress
  command:
    - claude
    - --allowedTools
    - Read,Write,Edit,MultiEdit,Glob,Grep,Bash,Skill
