<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <rect width="40" height="40" fill="#ec4899"/>
  <!-- Teal bob: top narrows for circular clip -->
  <rect x="12" y="2" width="16" height="2" fill="#22d3ee"/>
  <rect x="8" y="4" width="24" height="4" fill="#22d3ee"/>
  <rect x="6" y="8" width="4" height="10" fill="#22d3ee"/>
  <rect x="30" y="8" width="4" height="10" fill="#22d3ee"/>
  <!-- Fair skin face -->
  <rect x="10" y="8" width="20" height="14" fill="#fde68a"/>
  <!-- Eyes -->
  <rect x="14" y="13" width="3" height="2" fill="#0f172a"/>
  <rect x="23" y="13" width="3" height="2" fill="#0f172a"/>
  <!-- Big smile -->
  <rect x="15" y="19" width="10" height="2" fill="#be185d"/>
  <!-- AirPods (white dots at ear level, visible between hair and face) -->
  <rect x="7" y="15" width="2" height="3" fill="#f8fafc"/>
  <rect x="31" y="15" width="2" height="3" fill="#f8fafc"/>
  <!-- Neck -->
  <rect x="17" y="22" width="6" height="4" fill="#fde68a"/>
  <!-- White shirt with pink collar hint -->
  <rect x="6" y="26" width="28" height="14" fill="#f8fafc"/>
  <rect x="15" y="26" width="10" height="2" fill="#fbcfe8"/>
</svg>
