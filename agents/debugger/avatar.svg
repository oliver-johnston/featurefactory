<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <rect width="40" height="40" fill="#334155"/>
  <!-- Disheveled medium-brown hair (developer bedhead) -->
  <rect x="11" y="3" width="18" height="2" fill="#4a2c10"/>
  <rect x="9" y="5" width="22" height="4" fill="#4a2c10"/>
  <rect x="7" y="7" width="26" height="3" fill="#4a2c10"/>
  <rect x="8" y="10" width="3" height="5" fill="#4a2c10"/>
  <rect x="29" y="10" width="3" height="5" fill="#4a2c10"/>
  <!-- Cowlick sticking up (disheveled) -->
  <rect x="19" y="1" width="4" height="4" fill="#5c3820"/>
  <!-- Medium warm-brown skin -->
  <rect x="10" y="9" width="20" height="14" fill="#9c5a28"/>
  <!-- Furrowed brow shadows (tired / concentrated) -->
  <rect x="12" y="12" width="6" height="1" fill="#7a4020"/>
  <rect x="22" y="12" width="6" height="1" fill="#7a4020"/>
  <!-- Tired focused eyes -->
  <rect x="14" y="14" width="3" height="1" fill="#1c1917"/>
  <rect x="23" y="14" width="3" height="1" fill="#1c1917"/>
  <!-- Under-eye shadows (sleep-deprived) -->
  <rect x="13" y="15" width="5" height="1" fill="#7a4020"/>
  <rect x="22" y="15" width="5" height="1" fill="#7a4020"/>
  <!-- Concentrated flat mouth -->
  <rect x="17" y="20" width="6" height="1" fill="#5c3317"/>
  <!-- Neck -->
  <rect x="17" y="23" width="6" height="3" fill="#9c5a28"/>
  <!-- Dark slate hoodie -->
  <rect x="4" y="26" width="32" height="14" fill="#1e293b"/>
  <!-- Hood shoulder panels -->
  <rect x="10" y="26" width="8" height="3" fill="#334155"/>
  <rect x="22" y="26" width="8" height="3" fill="#334155"/>
  <!-- Terminal / console pocket -->
  <rect x="13" y="31" width="14" height="9" fill="#0f172a"/>
  <!-- Code lines in terminal (cyan and green) -->
  <rect x="14" y="33" width="8" height="1" fill="#22d3ee"/>
  <rect x="14" y="35" width="5" height="1" fill="#4ade80"/>
  <rect x="14" y="37" width="10" height="1" fill="#22d3ee"/>
</svg>
