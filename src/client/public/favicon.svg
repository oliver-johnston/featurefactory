<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges" image-rendering="pixelated">
  <title>Feature Factory</title>

  <!-- Background -->
  <rect width="32" height="32" fill="#1e1e2e" rx="3"/>

  <!-- Hard hat -->
  <rect x="6" y="4" width="8" height="3" fill="#f9e2af"/>
  <rect x="5" y="6" width="10" height="2" fill="#f9e2af"/>

  <!-- Head -->
  <rect x="7" y="8" width="6" height="4" fill="#cdd6f4"/>

  <!-- Body -->
  <rect x="7" y="12" width="6" height="6" fill="#6366f1"/>

  <!-- Arms -->
  <rect x="4" y="13" width="3" height="2" fill="#cdd6f4"/>
  <rect x="13" y="13" width="3" height="2" fill="#cdd6f4"/>

  <!-- Box -->
  <rect x="16" y="10" width="8" height="8" fill="#a5b4fc"/>
  <rect x="16" y="10" width="8" height="2" fill="#818cf8"/>

  <!-- Legs -->
  <rect x="7" y="18" width="2" height="4" fill="#4f46e5"/>
  <rect x="11" y="18" width="2" height="4" fill="#4f46e5"/>

  <!-- Boots -->
  <rect x="6" y="22" width="4" height="2" fill="#313244"/>
  <rect x="10" y="22" width="4" height="2" fill="#313244"/>

  <!-- Ground -->
  <rect x="2" y="26" width="28" height="2" fill="#313244" opacity="0.5"/>
</svg>
